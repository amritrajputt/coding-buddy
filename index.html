<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Buddy Chatbot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-main: #090a0f;
            --bg-capsule: #1e1f20;
            --bg-capsule-hover: #2a2b2c;
            --text-primary: #e3e3e3;
            --text-secondary: #c4c7c5;
            --text-muted: #8e918f;
            --accent-blue: #8ab4f8;
            --accent-hover: rgba(138, 180, 248, 0.08);
            --font-sans: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --font-mono: 'Space Mono', Consolas, Monaco, "Courier New", Courier, monospace;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-main);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .main-content {
            flex: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            background: radial-gradient(circle at 50% 45%, #181d34 0%, #0d0f18 60%, #090a0f 100%);
        }

        .top-bar {
            width: 100%;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 50;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .brand-title {
            font-size: 1.25rem;
            font-weight: 500;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-area {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            padding: 0 24px;
            position: relative;
            scroll-behavior: smooth;
            min-height: 0;
        }

        .chat-area::-webkit-scrollbar {
            width: 8px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .landing-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex: 1;
            padding-bottom: 20px;
            animation: fadeIn 0.6s ease;
        }

        .landing-title {
            font-size: 3rem;
            font-weight: 500;
            color: #fff;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .typing-cursor {
            display: inline-block;
            width: 3px;
            height: 1em;
            background-color: #fff;
            margin-left: 6px;
            vertical-align: middle;
            animation: blink 0.8s infinite;
        }

        .chat-history {
            display: none;
            flex-direction: column;
            gap: 32px;
            width: 100%;
            max-width: 760px;
            padding: 20px 0 100px 0;
        }

        .message-row {
            display: flex;
            gap: 16px;
            width: 100%;
        }

        .message-content {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-primary);
            max-width: 85%;
        }

        .message-row.gemini .message-content {
            align-self: flex-start;
        }

        .message-row.user .message-content {
            background-color: rgba(255, 255, 255, 0.06);
            padding: 12px 20px;
            border-radius: 18px;
            max-width: 80%;
        }

        .message-content p {
            margin-bottom: 12px;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .message-content code {
            font-family: var(--font-mono);
            background-color: rgba(255, 255, 255, 0.1);
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 0.9em;
            color: #e3e3e3;
        }

        .message-content pre {
            margin: 16px 0;
            border-radius: 12px;
            background-color: #0e0e10;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #1e1e24;
            padding: 8px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: inherit;
            font-size: 0.75rem;
            transition: color 0.2s ease;
        }

        .copy-btn:hover {
            color: var(--text-primary);
        }

        .message-content pre code {
            display: block;
            padding: 16px;
            overflow-x: auto;
            background-color: transparent;
            font-size: 0.85rem;
            color: #f3f1f9;
        }

        .message-content ul, .message-content ol {
            margin-left: 24px;
            margin-bottom: 12px;
        }

        .message-content li {
            margin-bottom: 6px;
        }

        .message-content h1, .message-content h2, .message-content h3 {
            margin: 20px 0 10px 0;
            font-weight: 600;
            color: #fff;
        }

        .message-content h1 { font-size: 1.5rem; }
        .message-content h2 { font-size: 1.3rem; }
        .message-content h3 { font-size: 1.15rem; }

        .dots-loader {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 12px 0;
        }

        .dots-loader span {
            width: 8px;
            height: 8px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            animation: dotsPulse 1.2s infinite ease-in-out both;
        }

        .dots-loader span:nth-child(1) { animation-delay: -0.32s; }
        .dots-loader span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes dotsPulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        .error-message {
            background-color: rgba(217, 101, 112, 0.1);
            border: 1px solid rgba(217, 101, 112, 0.2);
            color: #d96570;
            padding: 12px 16px;
            border-radius: 12px;
            margin-top: 10px;
            font-size: 0.9rem;
            width: 100%;
            max-width: 760px;
        }

        .footer-panel {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 24px 20px 24px;
            z-index: 10;
        }

        .input-capsule {
            width: 100%;
            max-width: 760px;
            background-color: var(--bg-capsule);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            padding: 8px 16px 8px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        .input-capsule:focus-within {
            background-color: var(--bg-capsule-hover);
            border-color: rgba(255,255,255,0.1);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1.05rem;
            padding: 8px 0;
            resize: none;
            max-height: 120px;
            line-height: 1.5;
            overflow-y: auto;
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .input-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .control-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .control-btn:hover {
            background-color: rgba(255,255,255,0.05);
            color: var(--text-primary);
        }

        .control-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .disclaimer-text {
            font-size: 0.72rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 12px;
            max-width: 600px;
            line-height: 1.4;
        }

        .disclaimer-text a {
            color: var(--text-muted);
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        @media (max-width: 768px) {
            .top-bar {
                padding: 12px 16px;
            }

            .chat-area {
                padding: 0 16px;
            }

            .landing-title {
                font-size: 2.2rem;
            }

            .input-capsule {
                padding: 6px 12px 6px 16px;
            }

            .chat-input {
                font-size: 0.95rem;
            }

            .footer-panel {
                padding: 10px 16px 15px 16px;
            }
        }

        @media (max-width: 600px) {
            .top-btn span {
                display: none;
            }
            
            .top-btn {
                padding: 8px;
                border-radius: 50%;
            }

            .model-badge span {
                display: none;
            }

            .model-badge {
                padding: 8px;
                border-radius: 50%;
            }
        }
    </style>
</head>

<body>
    <main class="main-content">
        <header class="top-bar">
            <div class="brand-title">
                <span>Coding Buddy</span>
            </div>
            <!-- Top bar controls removed -->
        </header>

        <div class="chat-area" id="chat-area">
            <div class="landing-container" id="landing-container">
                <h1 class="landing-title" id="landing-title">Ready when you are<span class="typing-cursor"></span></h1>
            </div>

            <div class="chat-history" id="chat">
            </div>
        </div>

        <footer class="footer-panel">
            <div class="input-capsule">
                <textarea id="input" class="chat-input" placeholder="Ask Coding Buddy" rows="1" autocomplete="off"></textarea>
                
                <div class="input-controls">
                    <button class="control-btn" id="send" disabled title="Send message">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
            
            <div class="disclaimer-text">
                Coding Buddy may display inaccurate info, including about people, so double-check its responses. 
            </div>
        </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="dom.js"></script>
</body>

</html>
